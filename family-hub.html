<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schwarz Family Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1729;
      --card-bg: #1a2340;
      --card-hover: #1e2a4a;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --gold: #f0c040;
      --blue: #4da6ff;
      --green: #5cd85c;
      --purple: #b07aff;
      --orange: #ff9a3c;
      --pink: #ff6b9d;
      --border: #ffffff10;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      margin: 0;
      min-height: 100vh;
    }

    .container { max-width: 600px; margin: 0 auto; padding: 20px; }

    .hub-header {
      text-align: center;
      padding: 32px 0 24px;
    }
    .hub-header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .hub-header p { color: var(--text-dim); font-size: 14px; }

    .person-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .person-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .person-card:hover {
      background: var(--card-hover);
      transform: translateY(-3px);
      box-shadow: 0 6px 16px #00000040;
    }

    .person-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .avatar-kurt { background: linear-gradient(135deg, var(--gold), var(--orange)); color: var(--bg); }
    .avatar-erika { background: linear-gradient(135deg, var(--pink), var(--purple)); color: var(--bg); }
    .avatar-isabel { background: linear-gradient(135deg, var(--purple), var(--blue)); color: var(--bg); }
    .avatar-ian { background: linear-gradient(135deg, var(--blue), var(--purple)); color: var(--bg); }
    .avatar-dane { background: linear-gradient(135deg, var(--green), var(--blue)); color: var(--bg); }

    .person-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .person-role {
      font-size: 12px;
      color: var(--text-dim);
    }

    .shared-links {
      margin-top: 8px;
    }
    .shared-link {
      display: block;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      text-decoration: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .shared-link:hover {
      background: var(--card-hover);
      border-color: #f0c04030;
    }
    .shared-link .link-icon { font-size: 24px; }
    .shared-link .link-text { color: var(--text); font-weight: 600; font-size: 15px; }
    .shared-link .link-desc { color: var(--text-dim); font-size: 12px; }

    @media (max-width: 430px) {
      .container { padding: 14px; }
      .hub-header h1 { font-size: 24px; }
      .hub-header { padding: 20px 0 16px; }
      .person-grid { gap: 10px; }
      .person-card { padding: 20px 12px; }
      .person-avatar { width: 48px; height: 48px; font-size: 22px; }
      .person-name { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="hub-header">
      <h1>Schwarz Family</h1>
      <p>Everyone's pages, all in one place</p>
    </header>

    <!-- Person Cards -->
    <div class="person-grid">
      <a href="family-kurt.html" class="person-card">
        <div class="person-avatar avatar-kurt">K</div>
        <div class="person-name">Kurt</div>
        <div class="person-role">Dad</div>
      </a>
      <a href="family-erika.html" class="person-card">
        <div class="person-avatar avatar-erika">E</div>
        <div class="person-name">Erika</div>
        <div class="person-role">Mom</div>
      </a>
      <a href="family-isabel.html" class="person-card">
        <div class="person-avatar avatar-isabel">I</div>
        <div class="person-name">Isabel</div>
        <div class="person-role"></div>
      </a>
      <a href="family-ian.html" class="person-card">
        <div class="person-avatar avatar-ian">I</div>
        <div class="person-name">Ian</div>
        <div class="person-role">11</div>
      </a>
      <a href="family-dane.html" class="person-card">
        <div class="person-avatar avatar-dane">D</div>
        <div class="person-name">Dane</div>
        <div class="person-role">7</div>
      </a>
    </div>

    <!-- Shared Pages -->
    <div class="shared-links">
      <a href="family.html" class="shared-link">
        <span class="link-icon">🎯</span>
        <div>
          <div class="link-text">Family Fun Board</div>
          <div class="link-desc">Activities, ideas, and what's happening</div>
        </div>
      </a>
      <a href="calendar-weekly.html" class="shared-link">
        <span class="link-icon">📅</span>
        <div>
          <div class="link-text">Family Calendar</div>
          <div class="link-desc">Everyone's schedule this week</div>
        </div>
      </a>
    </div>

  </div>
</body>
</html>
